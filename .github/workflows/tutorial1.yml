name: tutorial1

on: push

jobs:
  job1:
    name: job1
    runs-on: ubuntu-latest

    steps:
      - name: setup python
        uses: actions/setup-python@v6
        with:
            python-version: 3.312
        
      - name: Print today's date
        run: date
  job2:
    name: job2
    runs-on: windows-latest
    steps:
      - name: step2
        run: echo "hellow from job 2"

      - name: Print today's date
        run: date

  job3:
    runs-on: ubuntu-latest
    steps:
      - name: step 3
        run: echo "hello from job 3"

      - name: Print today's date
        run: date


  job4:
    needs: [job1, job2]
    runs-on: ubuntu-latest
    steps:
      - name: step 3
        run: echo "I am job 4"

    


